<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Clone Work Items</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 16px 20px;
            color: #333;
            font-size: 13px;
        }
        h3 { margin: 0 0 8px 0; font-size: 14px; }
        .row { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: 600; }
        input[type="number"], input[type="text"] {
            width: 220px;
            padding: 4px 6px;
            font-size: 13px;
            border: 1px solid #c8c8c8;
            border-radius: 2px;
        }
        .hint { color: #666; font-size: 12px; margin-top: 2px; }
        .checks label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .selected-list {
            max-height: 110px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            background: #fafafa;
            padding: 6px 8px;
            border-radius: 2px;
            font-family: Consolas, "Courier New", monospace;
            font-size: 12px;
        }
        .btn-row { display: flex; gap: 8px; margin-top: 12px; }
        .btn {
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #106ebe;
            background: #106ebe;
            color: #fff;
            border-radius: 2px;
        }
        .btn:hover { background: #005a9e; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: #fff; color: #106ebe; }
        .progress {
            margin-top: 10px;
            border-left: 4px solid #106ebe;
            background: #f4f4f4;
            padding: 8px 12px;
            max-height: 180px;
            overflow-y: auto;
            font-family: Consolas, "Courier New", monospace;
            font-size: 12px;
            white-space: pre-wrap;
            display: none;
        }
        .progress.visible { display: block; }
        .summary {
            margin-top: 10px;
            border-left: 4px solid #107c10;
            background: #f4faf4;
            padding: 10px 14px;
            display: none;
        }
        .summary.visible { display: block; }
        .summary p { margin: 2px 0; }
        .summary a { color: #106ebe; text-decoration: none; }
        .summary a:hover { text-decoration: underline; }
        .warning {
            margin-top: 10px;
            border-left: 4px solid #f0ad4e;
            background: #fff8e1;
            color: #5a3a00;
            padding: 8px 12px;
            display: none;
            font-size: 12px;
            line-height: 1.4;
        }
        .warning.visible { display: block; }
        .warning strong { color: #5a3a00; }
        .error { color: #a4262c; }
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid #ccc;
            border-top-color: #106ebe;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <script src="../vsts/VSS.SDK.min.js"></script>

    <div id="root">
        <div class="row">
            <label>Selected work items (<span id="count">0</span>)</label>
            <div id="selected" class="selected-list"></div>
        </div>

        <div class="row">
            <label for="parentId">New parent work item ID</label>
            <input id="parentId" type="number" min="1" placeholder="e.g. 12345" />
            <div class="hint">Cloned items will inherit Area Path &amp; Iteration from this parent and be linked to it as children.</div>
        </div>

        <div class="row checks">
            <label style="font-weight:600;">Also copy these from the original work items</label>
            <label><input type="checkbox" id="optRelated"   checked /> Related links</label>
            <label><input type="checkbox" id="optPredSucc"  checked /> Predecessor / Successor links</label>
            <label><input type="checkbox" id="optAffects"           /> Affects / Affected By links</label>
            <label><input type="checkbox" id="optTested"            /> Tested By / Tests links</label>
            <label><input type="checkbox" id="optRemote"            /> All other work-item links</label>
            <label><input type="checkbox" id="optHyperlinks" checked /> Hyperlinks</label>
            <label><input type="checkbox" id="optAttachments"        /> Attachments</label>
            <label><input type="checkbox" id="optTags"      checked /> Tags</label>
            <div class="hint">Parent / Child links are never copied — the new parent you specify above is used instead.</div>
        </div>

        <div class="btn-row">
            <button id="cloneBtn" class="btn" disabled>Clone</button>
        </div>

        <div id="processWarning" class="warning"></div>
        <div id="progress" class="progress"></div>
        <div id="summary" class="summary"></div>
    </div>

    <script>
        VSS.init({
            usePlatformScripts: true,
            usePlatformStyles: true,
            explicitNotifyLoaded: true
        });

        VSS.require([
            "TFS/WorkItemTracking/RestClient",
            "TFS/WorkItemTracking/Contracts"
        ], function (WitClient, WitContracts) {
            var witClient = WitClient.getClient();
            var webContext = VSS.getWebContext();
            var projectName = webContext.project.name;
            var collectionUri = webContext.collection.uri;

            // ── Wired-up by the menu action with the selected ids ────────
            var workItemIds = [];

            // Cache: work-item type name -> initial state name (in "Proposed" category).
            var initialStateCache = {};

            // Look up the default initial state for a work-item type.
            // Uses the type's state categories — "Proposed" holds the new/initial state(s).
            function getInitialState(typeName) {
                if (initialStateCache[typeName] !== undefined) {
                    return Promise.resolve(initialStateCache[typeName]);
                }
                return witClient.getWorkItemType(projectName, typeName).then(function (wit) {
                    var pick = null;
                    if (wit && Array.isArray(wit.states)) {
                        // Prefer the first state in the "Proposed" category.
                        for (var i = 0; i < wit.states.length; i++) {
                            if (wit.states[i].category === "Proposed") {
                                pick = wit.states[i].name; break;
                            }
                        }
                        // Fallback: first non-Completed/Removed state.
                        if (!pick) {
                            for (var j = 0; j < wit.states.length; j++) {
                                var c = wit.states[j].category;
                                if (c !== "Completed" && c !== "Removed") {
                                    pick = wit.states[j].name; break;
                                }
                            }
                        }
                        // Last resort: whatever the type says is its default new-state.
                        if (!pick && wit.states.length) pick = wit.states[0].name;
                    }
                    initialStateCache[typeName] = pick;
                    return pick;
                }, function () {
                    initialStateCache[typeName] = null;
                    return null;
                });
            }

            // Fields we never copy from the source.
            // (They're either system-generated or explicitly overridden.)
            var SKIP_FIELDS = {
                "System.Id": 1,
                "System.Rev": 1,
                "System.AreaId": 1,
                "System.IterationId": 1,
                "System.AreaPath": 1,
                "System.IterationPath": 1,
                "System.AssignedTo": 1,
                "System.State": 1,
                "System.Reason": 1,
                "System.CreatedBy": 1,
                "System.CreatedDate": 1,
                "System.ChangedBy": 1,
                "System.ChangedDate": 1,
                "System.AuthorizedAs": 1,
                "System.AuthorizedDate": 1,
                "System.RevisedDate": 1,
                "System.Watermark": 1,
                "System.NodeName": 1,
                "System.TeamProject": 1,
                "System.History": 1,
                "System.PersonId": 1,
                "System.BoardColumn": 1,
                "System.BoardColumnDone": 1,
                "System.BoardLane": 1,
                "Microsoft.VSTS.Common.StateChangeDate": 1,
                "Microsoft.VSTS.Common.ActivatedDate": 1,
                "Microsoft.VSTS.Common.ActivatedBy": 1,
                "Microsoft.VSTS.Common.ResolvedDate": 1,
                "Microsoft.VSTS.Common.ResolvedBy": 1,
                "Microsoft.VSTS.Common.ClosedDate": 1,
                "Microsoft.VSTS.Common.ClosedBy": 1
            };

            // ── DOM helpers ─────────────────────────────────────────────
            var $ = function (id) { return document.getElementById(id); };

            var progressEl = $("progress");
            var summaryEl  = $("summary");
            function logProgress(msg, isError) {
                progressEl.classList.add("visible");
                var line = document.createElement("div");
                if (isError) line.className = "error";
                line.textContent = msg;
                progressEl.appendChild(line);
                progressEl.scrollTop = progressEl.scrollHeight;
            }

            function setSelected(ids) {
                workItemIds = ids.slice();
                $("count").textContent = ids.length;
                $("selected").textContent = ids.map(function (i) { return "#" + i; }).join(", ");
            }

            // ── Decide which relations to keep based on checkbox state ──
            function shouldCopyRelation(rel) {
                if (!rel || !rel.rel) return false;
                var t = rel.rel;

                // Never copy parent/child hierarchy — caller picks new parent.
                if (t === "System.LinkTypes.Hierarchy-Forward") return false;
                if (t === "System.LinkTypes.Hierarchy-Reverse") return false;

                if (t === "AttachedFile")        return $("optAttachments").checked;
                if (t === "Hyperlink")           return $("optHyperlinks").checked;
                if (t === "ArtifactLink")        return $("optHyperlinks").checked;

                if (t === "System.LinkTypes.Related")                       return $("optRelated").checked;
                if (t === "System.LinkTypes.Dependency-Forward")            return $("optPredSucc").checked;
                if (t === "System.LinkTypes.Dependency-Reverse")            return $("optPredSucc").checked;
                if (t === "Microsoft.VSTS.Common.Affects-Forward")          return $("optAffects").checked;
                if (t === "Microsoft.VSTS.Common.Affects-Reverse")          return $("optAffects").checked;
                if (t === "Microsoft.VSTS.Common.TestedBy-Forward")         return $("optTested").checked;
                if (t === "Microsoft.VSTS.Common.TestedBy-Reverse")         return $("optTested").checked;

                // Anything else (Remote links, Shared Steps, etc.)
                return $("optRemote").checked;
            }

            // ── Helpers ─────────────────────────────────────────────────
            function workItemIdFromUrl(url) {
                if (!url) return null;
                var m = /\/workItems\/(\d+)(?:[?#].*)?$/i.exec(url);
                return m ? parseInt(m[1], 10) : null;
            }

            // Find the original parent id (Hierarchy-Reverse) of a source work item.
            function findOriginalParentId(source) {
                if (!source || !Array.isArray(source.relations)) return null;
                for (var i = 0; i < source.relations.length; i++) {
                    var rel = source.relations[i];
                    if (rel && rel.rel === "System.LinkTypes.Hierarchy-Reverse") {
                        return workItemIdFromUrl(rel.url);
                    }
                }
                return null;
            }

            // ── Build the JSON Patch document for one clone ─────────────
            // parentInherit  — the work item we read AreaPath/IterationPath from
            //                  (always the user-specified new parent)
            // parentLinkId   — the id we attach as Hierarchy-Reverse for THIS clone
            //                  (either the new-parent id, or the cloned ancestor's new id)
            function buildPatchDoc(source, parentInherit, parentLinkId, copyTags) {
                var patch = [];

                // Copy every field one-to-one (including custom fields), skipping
                // only the system / overridden ones in SKIP_FIELDS.
                // getWorkItem(..., expand=All) returns ALL fields the work item has,
                // so custom-process fields are included automatically.
                var fields = source.fields || {};
                Object.keys(fields).forEach(function (name) {
                    if (SKIP_FIELDS[name]) return;
                    if (!copyTags && name === "System.Tags") return;
                    var val = fields[name];
                    if (typeof val === "undefined" || val === null) return;

                    // Identity fields come back as objects. Prefer uniqueName
                    // (user@example.com), fall back to descriptor / displayName.
                    if (typeof val === "object") {
                        if (val.uniqueName)       val = val.uniqueName;
                        else if (val.descriptor)  val = val.descriptor;
                        else if (val.displayName) val = val.displayName;
                        else return; // unknown object shape — skip rather than corrupt
                    }

                    // Empty strings are valid (some custom HTML/text fields).
                    patch.push({ op: "add", path: "/fields/" + name, value: val });
                });

                // Inherited from the user-specified new parent.
                patch.push({ op: "add", path: "/fields/System.AreaPath",
                             value: parentInherit.fields["System.AreaPath"] });
                patch.push({ op: "add", path: "/fields/System.IterationPath",
                             value: parentInherit.fields["System.IterationPath"] });

                // Parent link (preserving original hierarchy among selected items).
                patch.push({
                    op: "add",
                    path: "/relations/-",
                    value: {
                        rel: "System.LinkTypes.Hierarchy-Reverse",
                        url: collectionUri + "_apis/wit/workItems/" + parentLinkId,
                        attributes: { comment: "Cloned via Clone Work Items extension" }
                    }
                });

                // Other relations the user opted into.
                if (Array.isArray(source.relations)) {
                    source.relations.forEach(function (rel) {
                        if (!shouldCopyRelation(rel)) return;
                        var copy = { rel: rel.rel, url: rel.url };
                        if (rel.attributes) {
                            // Strip read-only attributes; keep comment + name.
                            copy.attributes = {};
                            if (rel.attributes.comment) copy.attributes.comment = rel.attributes.comment;
                            if (rel.attributes.name)    copy.attributes.name    = rel.attributes.name;
                        }
                        patch.push({ op: "add", path: "/relations/-", value: copy });
                    });
                }

                return patch;
            }

            // ── The clone pipeline ──────────────────────────────────────
            function workItemUrl(id) {
                return webContext.host.uri + webContext.project.name +
                       "/_workitems/edit/" + id;
            }

            // Fetch all sources up-front (with relations) so we can compute hierarchy.
            function fetchAllSources(ids) {
                // getWorkItems supports up to 200 ids; for simplicity fetch one-by-one in parallel.
                var promises = ids.map(function (id) {
                    return witClient.getWorkItem(id, null, null, WitContracts.WorkItemExpand.All)
                        .then(function (wi) { return { id: id, wi: wi }; },
                              function (err) { return { id: id, error: err }; });
                });
                return Promise.all(promises);
            }

            // Topologically order sources so a parent is always cloned before its children.
            // Returns an array of source items in clone order.
            function orderByHierarchy(sources, selectedSet) {
                // Build map id -> source
                var byId = {};
                sources.forEach(function (s) { byId[s.id] = s; });

                var ordered = [];
                var visited = {};
                var visiting = {};

                function visit(id) {
                    if (visited[id]) return;
                    if (visiting[id]) return; // cycle guard
                    visiting[id] = true;
                    var s = byId[id];
                    if (s && s.wi) {
                        var origParent = findOriginalParentId(s.wi);
                        if (origParent && selectedSet[origParent]) {
                            visit(origParent);
                        }
                    }
                    visiting[id] = false;
                    visited[id] = true;
                    ordered.push(s);
                }

                sources.forEach(function (s) { visit(s.id); });
                return ordered;
            }

            function cloneOne(source, parentInherit, parentLinkId) {
                var type = source.fields["System.WorkItemType"];
                var copyTags = $("optTags").checked;
                return getInitialState(type).then(function (initialState) {
                    var patch = buildPatchDoc(source, parentInherit, parentLinkId, copyTags);
                    if (initialState) {
                        patch.push({ op: "add", path: "/fields/System.State", value: initialState });
                    }
                    // bypassRules=false → workflow rules apply, so the state machine
                    // accepts the initial state and any required-field defaults kick in.
                    return witClient.createWorkItem(
                        patch, projectName, type, false, false
                    ).then(function (created) {
                        return { ok: true, sourceId: source.id, newId: created.id, type: type,
                                 title: created.fields["System.Title"] };
                    }, function (err) {
                        return { ok: false, sourceId: source.id, type: type,
                                 error: (err && err.message) || String(err) };
                    });
                });
            }

            // ── Process compatibility check ─────────────────────────────
            // For each unique source work-item type, check whether the same type
            // exists in the parent's project. Returns { ok: [type,...], missing: [type,...] }.
            function checkTypeCompatibility(parentProject, types) {
                var checks = types.map(function (t) {
                    return witClient.getWorkItemType(parentProject, t)
                        .then(function () { return { type: t, exists: true }; },
                              function ()  { return { type: t, exists: false }; });
                });
                return Promise.all(checks).then(function (rows) {
                    return {
                        ok:      rows.filter(function (r) { return  r.exists; }).map(function (r) { return r.type; }),
                        missing: rows.filter(function (r) { return !r.exists; }).map(function (r) { return r.type; })
                    };
                });
            }

            function runClone() {
                var parentIdRaw = $("parentId").value;
                var parentId = parseInt(parentIdRaw, 10);
                if (!parentId || parentId <= 0) {
                    alert("Please enter a valid parent work item ID.");
                    return Promise.resolve();
                }
                if (!workItemIds.length) {
                    alert("No source work items provided.");
                    return Promise.resolve();
                }

                // Disable the in-page Clone button so it can't be re-clicked while running.
                $("cloneBtn").disabled = true;
                $("processWarning").classList.remove("visible");
                $("processWarning").innerHTML = "";
                progressEl.innerHTML = "";
                summaryEl.classList.remove("visible");
                summaryEl.innerHTML = "";

                logProgress("Loading parent #" + parentId + " ...");
                return witClient.getWorkItem(parentId).then(function (parent) {
                    var parentProject = parent.fields["System.TeamProject"];
                    logProgress("Parent: " + parent.fields["System.WorkItemType"] +
                                " — " + parent.fields["System.Title"]);
                    logProgress("Project: "        + parentProject);
                    logProgress("Area Path: "      + parent.fields["System.AreaPath"]);
                    logProgress("Iteration Path: " + parent.fields["System.IterationPath"]);
                    logProgress("Loading " + workItemIds.length + " source work item(s)...");

                    return fetchAllSources(workItemIds).then(function (fetched) {
                        var sources = [];
                        var loadErrors = [];
                        var selectedSet = {};
                        fetched.forEach(function (f) {
                            if (f.error) {
                                loadErrors.push({ ok: false, sourceId: f.id,
                                    error: "Failed to load source: " + ((f.error && f.error.message) || String(f.error)) });
                            } else {
                                sources.push({ id: f.id, wi: f.wi });
                                selectedSet[f.id] = true;
                            }
                        });

                        // Collect unique work-item types and check compatibility with target project.
                        var typeSet = {};
                        sources.forEach(function (s) { typeSet[s.wi.fields["System.WorkItemType"]] = true; });
                        var uniqueTypes = Object.keys(typeSet);

                        return checkTypeCompatibility(parentProject, uniqueTypes).then(function (compat) {
                            // Report missing types if any.
                            if (compat.missing.length) {
                                var msg =
                                    "<strong>⚠ Process / type mismatch detected.</strong><br/>" +
                                    "The target project <strong>" + escapeHtml(parentProject) + "</strong> " +
                                    "does not have these work-item types: <strong>" +
                                    compat.missing.map(escapeHtml).join(", ") + "</strong>.<br/>" +
                                    "This usually means the source and target projects use different " +
                                    "processes (e.g. Scrum vs Agile vs Basic). " +
                                    "Work items of those types will be <strong>skipped</strong>. " +
                                    "Compatible types will still be cloned.";
                                $("processWarning").innerHTML = msg;
                                $("processWarning").classList.add("visible");
                                logProgress("WARNING: type(s) not present in target project '" +
                                            parentProject + "': " + compat.missing.join(", "), true);

                                // Confirm before proceeding so the user is fully aware.
                                if (!window.confirm(
                                    "The target project does not have these work-item types:\n  " +
                                    compat.missing.join(", ") +
                                    "\n\nThe source and target projects probably use different processes " +
                                    "(e.g. Scrum vs Agile). Items of those types will be skipped.\n\n" +
                                    "Continue cloning the compatible items?")) {
                                    logProgress("Aborted by user.", true);
                                    $("cloneBtn").disabled = false;
                                    return { parent: parent, results: loadErrors, aborted: true };
                                }
                            }

                            // Skip incompatible items.
                            var skipResults = [];
                            var compatibleSources = sources.filter(function (s) {
                                var t = s.wi.fields["System.WorkItemType"];
                                if (compat.missing.indexOf(t) >= 0) {
                                    skipResults.push({ ok: false, sourceId: s.id, type: t,
                                        error: "Skipped — type '" + t + "' does not exist in target project '" + parentProject + "'." });
                                    return false;
                                }
                                return true;
                            });
                            // Rebuild selectedSet without the skipped items so hierarchy ordering is correct.
                            var compatSet = {};
                            compatibleSources.forEach(function (s) { compatSet[s.id] = true; });

                            var ordered = orderByHierarchy(compatibleSources, compatSet);
                            logProgress("Cloning " + ordered.length + " work item(s) preserving hierarchy...");

                            var cloneMap = {};
                            var results = loadErrors.concat(skipResults);
                            var chain = Promise.resolve();

                            ordered.forEach(function (s) {
                                chain = chain.then(function () {
                                    var origParent = findOriginalParentId(s.wi);
                                    var parentLinkId, parentLabel;
                                    if (origParent && cloneMap[origParent]) {
                                        parentLinkId = cloneMap[origParent];
                                        parentLabel  = "cloned #" + parentLinkId +
                                                       " (was original parent #" + origParent + ")";
                                    } else {
                                        parentLinkId = parent.id;
                                        parentLabel  = "new parent #" + parent.id;
                                    }
                                    logProgress("  → cloning #" + s.id + " under " + parentLabel + " ...");
                                    return cloneOne(s.wi, parent, parentLinkId).then(function (r) {
                                        results.push(r);
                                        if (r.ok) {
                                            cloneMap[s.id] = r.newId;
                                            logProgress("    ✓ created #" + r.newId + " (" + r.type + ")");
                                        } else {
                                            logProgress("    ✗ failed: " + r.error, true);
                                        }
                                    });
                                });
                            });

                            return chain.then(function () { return { parent: parent, results: results }; });
                        });
                    });
                }).then(function (out) {
                    showSummary(out.parent, out.results);
                }, function (err) {
                    logProgress("Fatal error: " + ((err && err.message) || String(err)), true);
                    $("cloneBtn").disabled = false;
                });
            }

            function showSummary(parent, results) {
                var ok = results.filter(function (r) { return r.ok; });
                var bad = results.filter(function (r) { return !r.ok; });

                var html = "";
                html += "<p><strong>Clone complete.</strong></p>";
                html += "<p>Parent: <a target=\"_top\" href=\"" + workItemUrl(parent.id) + "\">#" +
                        parent.id + " — " + escapeHtml(parent.fields["System.Title"]) + "</a></p>";
                html += "<p>Cloned " + ok.length + " of " + results.length + " work item(s).</p>";
                if (ok.length) {
                    html += "<ul style=\"margin:6px 0 6px 18px;padding:0;\">";
                    ok.forEach(function (r) {
                        html += "<li>#" + r.sourceId + " → <a target=\"_top\" href=\"" +
                                workItemUrl(r.newId) + "\">#" + r.newId + "</a> — " +
                                escapeHtml(r.title || "") + " <em>(" + escapeHtml(r.type) + ")</em></li>";
                    });
                    html += "</ul>";
                }
                if (bad.length) {
                    html += "<p class=\"error\"><strong>" + bad.length + " failed:</strong></p>";
                    html += "<ul style=\"margin:6px 0 6px 18px;padding:0;\">";
                    bad.forEach(function (r) {
                        html += "<li class=\"error\">#" + r.sourceId + ": " +
                                escapeHtml(r.error) + "</li>";
                    });
                    html += "</ul>";
                }

                summaryEl.innerHTML = html;
                summaryEl.classList.add("visible");
            }

            function escapeHtml(s) {
                return String(s == null ? "" : s)
                    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }

            // ── Wire up UI ──────────────────────────────────────────────
            function refreshCloneBtn() {
                var pid = parseInt($("parentId").value, 10);
                $("cloneBtn").disabled = !(pid > 0 && workItemIds.length > 0);
            }
            $("parentId").addEventListener("input", refreshCloneBtn);
            $("cloneBtn").addEventListener("click", runClone);

            // ── Contribution instance: receives the selected ids ────────
            VSS.register("clone-work-items-dialog", {
                // setDialog is kept for API compatibility but no longer needed.
                setDialog: function (_d) { /* no-op */ },
                onReady: function (ids) {
                    setSelected(ids || []);
                    refreshCloneBtn();
                }
            });

            // Read ids from dialog config (set by openDialog's third arg).
            try {
                var config = VSS.getConfiguration();
                if (config && Array.isArray(config.workItemIds)) {
                    setSelected(config.workItemIds);
                    refreshCloneBtn();
                }
            } catch (e) { /* ignore */ }

            VSS.notifyLoadSucceeded();
        });
    </script>
</body>
</html>
