<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Clone Work Items - Action</title>
</head>
<body>
    <script src="../vsts/VSS.SDK.min.js"></script>
    <script>
        VSS.init({
            usePlatformScripts: true,
            usePlatformStyles: true,
            explicitNotifyLoaded: true
        });

        VSS.ready(function () {
            // Extract work item IDs from any of the action contexts ADO may pass.
            function extractIds(actionContext) {
                if (!actionContext) return [];
                if (Array.isArray(actionContext.workItemIds) && actionContext.workItemIds.length) {
                    return actionContext.workItemIds.slice();
                }
                if (Array.isArray(actionContext.ids) && actionContext.ids.length) {
                    return actionContext.ids.slice();
                }
                if (typeof actionContext.workItemId === "number") {
                    return [actionContext.workItemId];
                }
                if (typeof actionContext.id === "number") {
                    return [actionContext.id];
                }
                if (Array.isArray(actionContext.workItems)) {
                    return actionContext.workItems
                        .map(function (w) { return w && (w.id || w.workItemId); })
                        .filter(function (x) { return typeof x === "number"; });
                }
                return [];
            }

            var menuHandler = {
                execute: function (actionContext) {
                    var ids = extractIds(actionContext);
                    if (!ids.length) {
                        alert("Clone Work Items: no work items were selected.");
                        return;
                    }

                    var extCtx = VSS.getExtensionContext();
                    var dialogContributionId =
                        extCtx.publisherId + "." + extCtx.extensionId + ".clone-work-items-dialog";

                    VSS.getService(VSS.ServiceIds.Dialog).then(function (dialogSvc) {
                        var dialogOptions = {
                            title: "Clone " + ids.length + " work item" + (ids.length === 1 ? "" : "s"),
                            width: 580,
                            height: 620,
                            resizable: true,
                            // Hide the chrome OK button — the dialog has its own Clone button.
                            hideOkButton: true,
                            cancelText: "Close"
                        };

                        dialogSvc.openDialog(dialogContributionId, dialogOptions, { workItemIds: ids })
                            .then(function (createdDialog) {
                                createdDialog.getContributionInstance("clone-work-items-dialog").then(function (instance) {
                                    if (instance) {
                                        if (instance.setDialog) instance.setDialog(createdDialog);
                                        if (instance.onReady)   instance.onReady(ids);
                                    }
                                });
                            });
                    });
                }
            };

            // Register against both the contribution-qualified id and the short id so
            // the menu host always finds the handler.
            var ctx = VSS.getExtensionContext();
            var fullId = ctx.publisherId + "." + ctx.extensionId + ".clone-work-items-action";
            VSS.register(fullId, menuHandler);
            VSS.register("clone-work-items-action", menuHandler);

            VSS.notifyLoadSucceeded();
        });
    </script>
</body>
</html>
